<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Study Portal</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/808/808476.png">
    <style>
        :root { 
            --bg: #0b0e14; 
            --card: #161b22; 
            --accent: #7928ca; 
            --text: #e6edf3; 
            --subtext: #8b949e;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            touch-action: manipulation; 
        }

        /* Header & Search Area */
        header { 
            padding: 20px; 
            background: rgba(22, 27, 34, 0.95); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid #30363d; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .search-row { display: flex; max-width: 600px; margin: 0 auto 15px; }
        #search { 
            width: 100%; padding: 12px 20px; border-radius: 12px; 
            border: 1px solid #30363d; background: #0d1117; 
            color: white; font-size: 16px; outline: none;
        }
        #search:focus { border-color: var(--accent); }

        /* Category Filter Bar */
        .cat-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .cat-btn { 
            background: #21262d; color: var(--subtext); border: 1px solid #30363d; 
            padding: 8px 16px; border-radius: 20px; cursor: pointer; 
            font-size: 12px; font-weight: 600; transition: 0.2s; 
        }
        .cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Game Grid */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; padding: 25px; 
            height: 80vh; overflow-y: auto; 
            scrollbar-width: none;
        }
        .grid::-webkit-scrollbar { display: none; }

        .card { 
            background: var(--card); border: 1px solid #30363d; 
            border-radius: 14px; overflow: hidden; cursor: pointer; 
            position: relative; transition: transform 0.3s, border-color 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .thumb-container { width: 100%; aspect-ratio: 16/10; overflow: hidden; background: #000; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-info { padding: 12px; text-align: center; }
        .card h3 { font-size: 13px; margin: 0; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card .tag { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 800; margin-top: 4px; display: block; }

        /* Player Overlay */
        #player { 
            display:none; position:fixed; top:0; left:0; 
            width:100%; height:100%; background:var(--bg); 
            z-index: 9999; overflow-y: auto; 
        }
        .iframe-container { width: 100%; height: 65vh; background: #000; }
        iframe { width:100%; height:100%; border:none; }

        /* Game Info & Contact Panel */
        .info-panel { padding: 30px; max-width: 800px; margin: 0 auto; }
        .info-panel h2 { margin-top: 0; font-size: 28px; }
        .label { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; display: block; margin-top: 20px; }
        .info-panel p { color: var(--subtext); line-height: 1.6; margin-top: 5px; }

        .contact-box { 
            margin-top: 40px; padding: 20px; border-radius: 12px; 
            background: #1c2128; border: 1px dashed #444; text-align: center;
        }
        .contact-link { color: #58a6ff; text-decoration: none; font-weight: bold; }

        /* Controls */
        .controls { position: fixed; bottom: 25px; right: 25px; display: flex; gap: 12px; }
        .btn { 
            padding: 12px 24px; border-radius: 30px; border: none; 
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
        }
        .btn-main { background: var(--accent); color: white; }
        .btn-alt { background: #30363d; color: white; }

        /* Panic Key Hidden Trigger */
        .panic-trigger { position: fixed; bottom: 0; left: 0; width: 50px; height: 50px; z-index: 100000; cursor: default; }
    </style>
</head>
<body onkeydown="if(event.key.toLowerCase()==='p') panic()">

<header>
    <div class="search-row">
        <input type="text" id="search" placeholder="Search for a game..." oninput="render()">
    </div>
    <div class="cat-bar" id="cats"></div>
</header>

<div class="grid" id="game-grid"></div>

<div class="panic-trigger" onclick="panic()"></div>

<div id="player">
    <div class="iframe-container"><iframe id="frame" src="about:blank"></iframe></div>
    <div class="info-panel">
        <h2 id="det-title">Game Title</h2>
        <span class="label">Description</span>
        <p id="det-desc"></p>
        <span class="label">How to Play</span>
        <p id="det-how"></p>
        
        <div class="contact-box">
            <p>Want to add a new game?</p>
            <a href="mailto:your-elangford28@gulfstreamschool.org" class="contact-link">Contact Admin / Request Game</a>
        </div>
        <div style="height: 100px;"></div>
    </div>
    <div class="controls">
        <button class="btn btn-alt" onclick="reloadGame()">REFRESH</button>
        <button class="btn btn-main" onclick="closeGame()">EXIT</button>
    </div>
</div>

<script>
    let currentFilter = 'All';
    
    // THE GAME DATABASE
    const games = [
        { "t": "Slope", "u": "aHR0cHM6Ly9pbWFnZXMtb3BlbnNvY2lhbC5nb29nbGV1c2VyY29udGVudC5jb20vZ2FkZ2V0cy9pZnI/dXJsPWh0dHBzOi8vY2RuLmpzZGVsaXZyLm5ldC9naC9yYWJiaWRzNzYvNjZAbWFpbi9zbG9wZS54bWw=", "c": "Action", "i": "https://raw.githubusercontent.com/skid-inc/Slope/master/slope.png", "d": "Test your reflexes by rolling down a never-ending 3D slope.", "h": "Use Arrow keys or A/D to steer." },
        { "t": "Retro Bowl", "u": "aHR0cHM6Ly9pbWFnZXMtb3BlbnNvY2lhbC5nb29nbGV1c2VyY29udGVudC5jb20vZ2FkZ2V0cy9pZnI/dXJsPWh0dHBzOi8vY2RuLmpzZGVsaXZyLm5ldC9naC9yYWJiaWRzNzYvNjZAbWFpbi9yZXRyby1ib3dsLnhtbA==", "c": "Sports", "i": "https://retrobowl.me/retro-bowl-logo.png", "d": "Manage your team and lead them to the championship in this 8-bit classic.", "h": "Click and drag to throw, click to dodge." },
        { "t": "Moto X3M", "u": "aHR0cHM6Ly9pbWFnZXMtb3BlbnNvY2lhbC5nb29nbGV1c2VyY29udGVudC5jb20vZ2FkZ2V0cy9pZnI/dXJsPWh0dHBzOi8vY2RuLmpzZGVsaXZyLm5ldC9naC9yYWJiaWRzNzYvNjZAbWFpbi9tb3RvLXgzbS54bWw=", "c": "Sports", "i": "https://moto-x3m.io/images/moto-x3m.jpg", "d": "Stunt bike racing with dangerous obstacles and fast-paced levels.", "h": "Arrow keys to accelerate, brake, and tilt." },
        { "t": "Eggy Car", "u": "aHR0cHM6Ly9pbWFnZXMtb3BlbnNvY2lhbC5nb29nbGV1c2VyY29udGVudC5jb20vZ2FkZ2V0cy9pZnI/dXJsPWh0dHBzOi8vY2RuLmpzZGVsaXZyLm5ldC9naC9yYWJiaWRzNzYvNjZAbWFpbi9lZ2d5LWNhci54bWw=", "c": "Casual", "i": "https://eggycar.org/eggy-car.png", "d": "Drive uphill while keeping your egg safe inside the car.", "h": "A/D or Arrow keys to balance speed." },
        { "t": "Cookie Clicker", "u": "aHR0cHM6Ly9pbWFnZXMtb3BlbnNvY2lhbC5nb29nbGV1c2VyY29udGVudC5jb20vZ2FkZ2V0cy9pZnI/dXJsPWh0dHBzOi8vY2RuLmpzZGVsaXZyLm5ldC9naC9yYWJiaWRzNzYvNjZAbWFpbi9jb29raWUtY2xpY2tlci54bWw=", "c": "Casual", "i": "https://orteil.dashnet.org/cookieclicker/img/intro_bezel.png", "d": "Click the cookie to build an empire of grandmas and factories.", "h": "Click the cookie!" },
        { "t": "Tunnel Rush", "u": "aHR0cHM6Ly9pbWFnZXMtb3BlbnNvY2lhbC5nb29nbGV1c2VyY29udGVudC5jb20vZ2FkZ2V0cy9pZnI/dXJsPWh0dHBzOi8vY2RuLmpzZGVsaXZyLm5ldC9naC9yYWJiaWRzNzYvNjZAbWFpbi90dW5uZWwtcnVzaC54bWw=", "c": "Action", "i": "https://tunnel-rush.io/images/tunnel-rush-logo.png", "d": "Dodge neon obstacles at high speeds in a spinning tunnel.", "h": "Left/Right arrow keys to rotate." }
        // Note: You can add the remaining games here following this exact format.
    ];

    function panic() { window.location.replace('https://classroom.google.com'); }

    function render() {
        const grid = document.getElementById('game-grid');
        const term = document.getElementById('search').value.toLowerCase();
        
        // Generate Category Buttons
        const categories = ['All', ...new Set(games.map(g => g.c))];
        document.getElementById('cats').innerHTML = categories.map(cat => 
            `<button class="cat-btn ${cat === currentFilter ? 'active' : ''}" onclick="filterBy('${cat}')">${cat}</button>`
        ).join('');

        // Filter Game List
        const filtered = games.filter(g => {
            const matchesSearch = g.t.toLowerCase().includes(term);
            const matchesCat = currentFilter === 'All' || g.c === currentFilter;
            return matchesSearch && matchesCat;
        });

        grid.innerHTML = filtered.map(g => `
            <div class="card" onclick="play('${g.u}', '${g.t}', '${g.d}', '${g.h}')">
                <div class="thumb-container">
                    <img class="thumb-img" src="${g.i}" onerror="this.src='https://api.dicebear.com/7.x/identicon/svg?seed=${g.t}'">
                </div>
                <div class="card-info">
                    <h3>${g.t}</h3>
                    <span class="tag">${g.c}</span>
                </div>
            </div>
        `).join('');
    }

    function filterBy(cat) {
        currentFilter = cat;
        render();
    }

    function play(url, title, desc, how) {
        document.getElementById('frame').src = atob(url);
        document.getElementById('det-title').innerText = title;
        document.getElementById('det-desc').innerText = desc;
        document.getElementById('det-how').innerText = how;
        document.getElementById('player').style.display = 'block';
    }

    function closeGame() {
        document.getElementById('player').style.display = 'none';
        document.getElementById('frame').src = 'about:blank';
    }

    function reloadGame() {
        const f = document.getElementById('frame');
        const s = f.src;
        f.src = 'about:blank';
        setTimeout(() => f.src = s, 100);
    }

    render();
</script>
</body>
</html>
