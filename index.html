<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Study Portal</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/808/808476.png">
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --accent: #7928ca; 
            --text: #e6edf3; --subtext: #8b949e;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; overflow: hidden; touch-action: manipulation; 
        }

        /* Stealth Header */
        header { 
            padding: 20px; background: rgba(22, 27, 34, 0.95); 
            backdrop-filter: blur(15px); border-bottom: 1px solid #30363d; 
            position: sticky; top: 0; z-index: 100; 
        }
        .search-row { display: flex; max-width: 600px; margin: 0 auto 10px; }
        #search { 
            width: 100%; padding: 12px 20px; border-radius: 12px; 
            border: 1px solid #30363d; background: #0d1117; 
            color: white; font-size: 16px; outline: none;
        }

        .cat-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .cat-btn { 
            background: #21262d; color: var(--subtext); border: 1px solid #30363d; 
            padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; 
        }
        .cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Grid System */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; padding: 25px; height: 80vh; overflow-y: auto; scrollbar-width: none;
        }
        .grid::-webkit-scrollbar { display: none; }

        .card { 
            background: var(--card); border: 1px solid #30363d; border-radius: 14px; 
            overflow: hidden; cursor: pointer; transition: 0.3s; position: relative;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .thumb-container { width: 100%; aspect-ratio: 16/10; background: #000; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-info { padding: 12px; text-align: center; }
        .card h3 { font-size: 13px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card .tag { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; }

        /* Hidden Panic Button */
        .panic-trigger { position: fixed; bottom: 0; left: 0; width: 50px; height: 50px; z-index: 100000; }

        /* Game Detail Panel */
        #player { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index: 9999; overflow-y: auto; }
        .iframe-wrap { width: 100%; height: 65vh; background: #000; }
        iframe { width:100%; height:100%; border:none; }

        .info-panel { padding: 30px; max-width: 800px; margin: 0 auto; }
        .label { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 11px; margin-top: 20px; display: block; }
        .contact-box { margin-top: 30px; padding: 15px; background: #1c2128; border-radius: 10px; border: 1px dashed #444; text-align: center; }

        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
    </style>
</head>
<body onkeydown="if(event.key.toLowerCase()==='p') panic()">

<header>
    <div class="search-row"><input type="text" id="search" placeholder="Search Resources..." oninput="render()"></div>
    <div class="cat-bar" id="cats"></div>
</header>

<div class="grid" id="game-grid"></div>
<div class="panic-trigger" onclick="panic()"></div>

<div id="player">
    <div class="iframe-wrap"><iframe id="frame" src="about:blank"></iframe></div>
    <div class="info-panel">
        <h2 id="det-title"></h2>
        <span class="label">Overview</span><p id="det-desc"></p>
        <span class="label">Instructions</span><p id="det-how"></p>
        <div class="contact-box">
            <p>New game request? <a href="mailto:admin@example.com" style="color:var(--accent)">Contact Administrator</a></p>
        </div>
        <div style="height:80px;"></div>
    </div>
    <div class="controls">
        <button class="btn btn-main" onclick="closeGame()">EXIT</button>
    </div>
</div>

    let currentFilter = 'All';

    function panic() { window.location.replace('https://classroom.google.com'); }

    function render() {
        const grid = document.getElementById('game-grid');
        const term = document.getElementById('search').value.toLowerCase();
        const cats = ['All', ...new Set(games.map(g => g.c))];
        
        document.getElementById('cats').innerHTML = cats.map(c => 
            `<button class="cat-btn ${c === currentFilter ? 'active' : ''}" onclick="currentFilter='${c}';render()">${c}</button>`
        ).join('');

        const filtered = games.filter(g => (currentFilter === 'All' || g.c === currentFilter) && g.t.toLowerCase().includes(term));

        grid.innerHTML = filtered.map(g => `
            <div class="card" onclick="play('${g.u}', '${g.t}', '${g.d}', '${g.h}')">
                <div class="thumb-container"><img src="${g.i}" class="thumb-img" onerror="this.src='https://api.dicebear.com/7.x/identicon/svg?seed=${g.t}'"></div>
                <div class="card-info"><h3>${g.t}</h3><span class="tag">${g.c}</span></div>
            </div>
        `).join('');
    }

    function play(url, title, desc, how) {
        document.getElementById('frame').src = atob(url);
        document.getElementById('det-title').innerText = title;
        document.getElementById('det-desc').innerText = desc;
        document.getElementById('det-how').innerText = how;
        document.getElementById('player').style.display = 'block';
    }

    function closeGame() { document.getElementById('player').style.display = 'none'; document.getElementById('frame').src = 'about:blank'; }
    render();
</script>
</body>
</html>
